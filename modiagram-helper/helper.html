<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" id="theme-link" href="./css/style-light.css">
    <title>MO-Diagram Generator</title>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                // Dies hilft, wenn Elemente dynamisch per JS hinzugefügt werden
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>


</head>

<body>
    <h1>MO-Diagram Generator <img src="./data/icon.png" alt="icon"></h1>
    <br>
    <div class="file-controls">

        <select id="project-selector" onchange="switchProject()">
            <option value="null">-- Select Project --</option>
        </select>
        <button onclick="changeProject('unnamed', getEmptyData());
                    document.getElementById('project-selector').value = 'null';">New</button>
        <button onclick="saveProject()">Save</button>

        <input type="text" id="file_name_save" value="unnamed" style="border-style: dashed;">

        <button onclick="exportProject()">Export</button>

        <input type="file" id="file-upload" style="display:none" accept=".json">
        <button onclick="document.getElementById('file-upload').click()">Import</button>
        <label id="unsaved_notifier"></label>
        <button id="theme_switch" onclick="switchTheme()">&#x263D</button>
        <!-- <button onclick="load()">Projekt Laden</button> -->
    </div>
    <br>
    <div id=dreispalten style="display: flex;">

    </div>
    <br>
    <button onclick="evaluateIt();window.scrollTo(0, document.getElementById('output').offsetTop);"
        style="background: #4CAF50; color: white;">Generate LaTeX Code</button>
    <br>
    <div class="output-area">
        <div class="nice_box" id="diagram-settings">
            <ul>
                <li><label>
                        <input type="checkbox" onchange="compact = this.checked;evaluateIt();" id="compact" unchecked>
                        Compact
                    </label></li>
                <li><label>
                        <input type="checkbox" onchange="energy_scale = this.checked;evaluateIt();"
                            id="add_energy_scale" unchecked>
                        Add energy scale
                    </label></li>
                <hr>
                <li>
                    <label>
                        Column distance:
                        <input class="file-controls" onchange="column_width=Number(this.value);evaluateIt();"
                            type="number" id="column_width" step="0.1" value="3">
                    </label>
                </li>
                <hr>

                <li>
                    <label><input type="checkbox" onchange="expandLabel(this.checked)" unchecked>
                        Show individual labels
                    </label>
                </li>
                <hr>
                <li>
                    <button onclick="calculateMOs();">predict MOs (experimental)</button>
                </li>
                <hr>
                <hr>
                <li><label>
                        <input type="checkbox" onchange="disable_mathjax = this.checked;evaluateIt();"
                            id="disable_mathjax" unchecked>
                        Disable MathJax in preview
                    </label></li>
            </ul>
        </div>

        <div class="preview-container">
            <!-- <h3>Live-Vorschau</h3> -->
            <svg id="mo-preview" preserveAspectRatio="xMidYMid meet">
            </svg>
        </div>
    </div>

    <h2>LaTeX Output</h2>
    <div class="output-area">
        <div class="nice_box" id="figure-settings-container">
            <label id="make_figure_label">
                <input type="checkbox"
                    onchange="document.getElementById('figure-settings').hidden=!this.checked;evaluateIt();"
                    id="make_figure" checked>
                Create figure
            </label>
            <div id="figure-settings">
                <ul>
                    <li>
                        <label>
                            centered:
                            <input onchange="evaluateIt();" type="checkbox" id="figure-centered" checked>
                        </label>
                    </li>
                    <li>
                        <label>
                            reference:
                            <input class="file-controls" onchange="evaluateIt();" type="text" id="figure-reference"
                                value="fig:modiagram1">
                        </label>
                    </li>
                    <li>
                        <label>
                            caption:
                            <input class="file-controls" onchange="evaluateIt();" type="text" id="figure-caption"
                                value="">
                        </label>
                    </li>
                </ul>
            </div>
            <button class="file-controls" onclick="copyToClipboard();">Copy to Clipboard</button>
        </div>
        <textarea id="output" readonly></textarea>
        <iframe class="file-controls" src="./mini_tutorial.html"></iframe>
    </div>

    <div id="license" class="nice_box">&copy; 2026 modiagram-latex-integration. Licensed under <a
            href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener noreferrer">GPL v3</a>.</div>

    <!-- <script>
        
    </script> -->
    <script src="helper.js"></script>

</body>

</html>
