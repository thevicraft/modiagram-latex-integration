<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>MO-Diagram Generator</title>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                // Dies hilft, wenn Elemente dynamisch per JS hinzugefügt werden
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>


</head>

<body>
    <h1>MO-Diagram Generator $\sigma_2$</h1>
    <div class="file-controls">

        <select id="project-selector" onchange="switchProject()">
            <option value="null">-- Select Project --</option>
        </select>
        <button onclick="changeProject('unnamed', getEmptyData());
                    document.getElementById('project-selector').value = 'null';">New</button>
        <button onclick="saveProject()">Save</button>

        <input type="text" id="file_name_save" value="unnamed" style="border-style: dashed;">

        <button onclick="exportProject()">Export</button>

        <input type="file" id="file-upload" style="display:none" accept=".json">
        <button onclick="document.getElementById('file-upload').click()">Import</button>
        <label id="unsaved_notifier"></label>
        <!-- <button onclick="load()">Projekt Laden</button> -->
    </div>
    <div id=dreispalten style="display: flex;">

    </div>
    <br>
    <button onclick="evaluateIt()" style="background: #4CAF50; color: white;">Generate LaTeX Code</button>
    <br>
    <div class="output-area">
        <div id="diagram-settings">
            <ul>
                <li><label>
                        <input type="checkbox" id="compact" unchecked>
                        Compact
                    </label></li>
                <li><label>
                        <input type="checkbox" id="add_energy_scale" unchecked>
                        Add energy scale
                    </label></li>
                <li><label>
                        <input type="checkbox" id="disable_mathjax" unchecked>
                        Disable MathJax in preview
                    </label></li>
            </ul>
        </div>

        <div class="preview-container">
            <!-- <h3>Live-Vorschau</h3> -->
            <svg id="mo-preview" preserveAspectRatio="xMidYMid meet">
            </svg>
        </div>
    </div>

    <div>
        <h2>LaTeX Output</h2>
        <textarea id="output" readonly></textarea>
    </div>

    <!-- <script>
        
    </script> -->
    <script src="helper.js"></script>

</body>

</html>
